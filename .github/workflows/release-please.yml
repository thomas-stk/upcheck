name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Tag and draft-release new version if not already tagged
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          V=$(node -p "require('./package.json').version")
          if git ls-remote --exit-code --tags origin "refs/tags/v$V" >/dev/null 2>&1; then
            echo "v$V already tagged, nothing to do"
          else
            git tag "v$V" "$GITHUB_SHA"
            git push origin "v$V"
            gh release create "v$V" --draft --generate-notes
            PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/$GITHUB_SHA/pulls" --jq '.[0].number')
            if [ -n "$PR_NUMBER" ]; then
              gh pr comment "$PR_NUMBER" --body ":rocket: Released as [v$V](https://github.com/${{ github.repository }}/releases/tag/v$V) (draft until installers finish building)."
            fi
          fi
