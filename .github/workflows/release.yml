name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:win
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            release/*.exe
            release/latest.yml

  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run dist:mac
      - name: Create DMG with background
        run: |
          brew install create-dmg
          VERSION=$(node -p "require('./package.json').version")
          create-dmg \
            --volname "UpCheck" \
            --background "build/upcheck-dmg-background-660x400.png" \
            --window-size 660 400 \
            --icon-size 80 \
            --icon "UpCheck.app" 180 140 \
            --app-drop-link 480 140 \
            --no-internet-enable \
            "release/UpCheck-${VERSION}-universal.dmg" \
            "release/mac-universal/UpCheck.app"
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml
